<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Political MBTI · 政治类型测验</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Public+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C2B3A; --ink-soft:#51606D; --paper:#E7E6DC; --card:#F4F2EA;
    --paper-white:#FBFAF4; --line:#CDC8B9; --seal:#B23A2E; --seal-deep:#8F2C22;
    --brass:#8C7742;
    --disagree:#33566E; --agree:#B23A2E;
    --shadow:0 1px 0 rgba(28,43,58,.04), 0 18px 40px -24px rgba(28,43,58,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Public Sans","Noto Sans SC",system-ui,sans-serif;
    color:var(--ink); background:var(--paper);
    background-image:radial-gradient(rgba(28,43,58,.045) 1px, transparent 1px);
    background-size:22px 22px;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    display:flex; flex-direction:column; min-height:100%;
  }
  .wrap{width:100%; max-width:760px; margin:0 auto; padding:34px 24px 60px; flex:1;
        display:flex; flex-direction:column; justify-content:center}
  .mono{font-family:"Space Mono",ui-monospace,monospace; letter-spacing:.04em}
  .eyebrow{font-family:"Space Mono",monospace; font-size:12px; letter-spacing:.22em;
           text-transform:uppercase; color:var(--brass); font-weight:700}
  .display{font-family:"Fraunces","Noto Serif SC",Georgia,serif}
  .hidden{display:none !important}

  /* frame card */
  .sheet{background:var(--card); border:1px solid var(--line); border-radius:3px;
         box-shadow:var(--shadow); position:relative; padding:44px 40px}
  .sheet::before{content:""; position:absolute; inset:7px; border:1px solid rgba(140,119,66,.28);
         border-radius:2px; pointer-events:none}
  .sheet-inner{position:relative; z-index:1}

  /* ---------- INTRO ---------- */
  #intro .kicker{display:flex; justify-content:space-between; align-items:baseline;
         border-bottom:1px solid var(--line); padding-bottom:12px; margin-bottom:26px}
  #intro h1{font-family:"Fraunces","Noto Serif SC",Georgia,serif; font-weight:900;
         font-size:clamp(34px,7vw,58px); line-height:1.02; letter-spacing:-.01em; margin-bottom:10px}
  #intro .zh-sub{font-size:17px; color:var(--ink-soft); max-width:44ch; margin-bottom:26px}
  .rule-note{border-left:2px solid var(--seal); padding:2px 0 2px 16px; margin-bottom:30px;
         font-size:15px; color:var(--ink-soft); max-width:50ch}
  .meta-row{display:flex; gap:22px; margin-bottom:30px; flex-wrap:wrap}
  .meta{display:flex; flex-direction:column; gap:2px}
  .meta b{font-family:"Space Mono",monospace; font-size:22px; color:var(--ink)}
  .meta span{font-size:12px; letter-spacing:.06em; color:var(--ink-soft); text-transform:uppercase}
  .axes-preview{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:34px}
  .chip{font-family:"Space Mono",monospace; font-size:12px; border:1px solid var(--line);
        border-radius:999px; padding:5px 11px; color:var(--ink-soft); background:var(--paper-white)}
  .chip b{color:var(--seal)}
  .btn{font-family:"Public Sans",sans-serif; font-weight:600; font-size:16px; cursor:pointer;
       border:none; border-radius:2px; padding:15px 30px; background:var(--ink); color:var(--paper-white);
       letter-spacing:.02em; transition:transform .12s ease, background .2s ease}
  .btn:hover{background:#132030; transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.ghost{background:transparent; color:var(--ink); border:1px solid var(--ink)}
  .btn.ghost:hover{background:var(--ink); color:var(--paper-white)}
  .seal-stamp{position:absolute; right:26px; bottom:22px; width:104px; height:104px; opacity:.5;
       transform:rotate(-9deg)}

  /* ---------- QUIZ ---------- */
  #quiz .topbar{display:flex; align-items:center; gap:16px; margin-bottom:38px}
  .count{font-family:"Space Mono",monospace; font-size:13px; color:var(--ink-soft); white-space:nowrap}
  .count b{color:var(--seal); font-size:15px}
  .track{flex:1; height:3px; background:var(--line); border-radius:2px; overflow:hidden}
  .track > i{display:block; height:100%; width:0; background:var(--seal); transition:width .35s cubic-bezier(.4,0,.1,1)}
  .qcard{min-height:190px; display:flex; align-items:center}
  .statement{font-family:"Fraunces","Noto Serif SC",Georgia,serif; font-weight:400;
       font-size:clamp(22px,3.6vw,30px); line-height:1.4; letter-spacing:.005em}
  .statement .qn{font-family:"Space Mono",monospace; font-size:15px; color:var(--brass);
       display:block; margin-bottom:14px; font-weight:700}

  .likert{margin-top:40px}
  .scale{display:flex; align-items:center; justify-content:space-between; gap:2px}
  .dot{--d:30px; width:var(--d); height:var(--d); border-radius:50%; cursor:pointer; background:transparent;
       border:2px solid var(--ink-soft); transition:transform .14s ease, background .18s ease, border-color .18s ease;
       display:grid; place-items:center; flex:0 0 auto}
  .dot:hover{transform:scale(1.12)}
  .dot[data-v="-2"],.dot[data-v="-1"]{border-color:var(--disagree)}
  .dot[data-v="2"],.dot[data-v="1"]{border-color:var(--agree)}
  .dot[data-v="-2"]{--d:48px} .dot[data-v="-1"]{--d:39px}
  .dot[data-v="0"]{--d:30px; border-color:#9a9384}
  .dot[data-v="1"]{--d:39px} .dot[data-v="2"]{--d:48px}
  .dot.pick[data-v="-2"],.dot.pick[data-v="-1"]{background:var(--disagree); border-color:var(--disagree)}
  .dot.pick[data-v="1"],.dot.pick[data-v="2"]{background:var(--agree); border-color:var(--agree)}
  .dot.pick[data-v="0"]{background:#9a9384; border-color:#9a9384}
  .dot .k{font-family:"Space Mono",monospace; font-size:11px; color:var(--ink-soft)}
  .dot.pick .k{color:var(--paper-white)}
  .scale-labels{display:flex; justify-content:space-between; margin-top:14px}
  .scale-labels span{font-size:12.5px; color:var(--ink-soft); letter-spacing:.02em}
  .scale-labels .mid{color:#9a9384}
  .quiz-foot{display:flex; justify-content:space-between; align-items:center; margin-top:38px}
  .backbtn{background:none; border:none; cursor:pointer; font-family:"Space Mono",monospace;
       font-size:13px; color:var(--ink-soft); letter-spacing:.03em; padding:6px 2px}
  .backbtn:hover{color:var(--ink)}
  .backbtn:disabled{opacity:.3; cursor:default}
  .kbd-hint{font-family:"Space Mono",monospace; font-size:11.5px; color:var(--brass)}

  .fade-out{opacity:0; transform:translateY(-6px)}
  .qanim{transition:opacity .18s ease, transform .18s ease}

  /* ---------- RESULT ---------- */
  #result .res-eyebrow{text-align:center; margin-bottom:6px}
  .code-wrap{text-align:center; position:relative; padding:20px 0 8px}
  .seal-ring{position:absolute; top:50%; left:50%; width:230px; height:230px;
       transform:translate(-50%,-52%); border:2px solid rgba(178,58,46,.28); border-radius:50%;
       pointer-events:none}
  .seal-ring::after{content:""; position:absolute; inset:9px; border:1px solid rgba(178,58,46,.2); border-radius:50%}
  .code{font-family:"Fraunces","Noto Serif SC",Georgia,serif; font-weight:900;
       font-size:clamp(64px,15vw,120px); letter-spacing:.06em; color:var(--seal); line-height:1;
       display:inline-block}
  .code .stamp{display:inline-block; animation:stamp .5s cubic-bezier(.2,1.3,.4,1) both}
  .code .stamp:nth-child(2){animation-delay:.09s}
  .code .stamp:nth-child(3){animation-delay:.18s}
  .code .stamp:nth-child(4){animation-delay:.27s}
  @keyframes stamp{0%{opacity:0;transform:scale(1.8) rotate(-6deg)}60%{opacity:1;transform:scale(.92)}100%{opacity:1;transform:scale(1)}}
  .code-legend{font-family:"Space Mono",monospace; font-size:12px; letter-spacing:.14em; color:var(--brass);
       text-transform:uppercase; margin-top:12px}
  .portrait{text-align:center; font-family:"Fraunces","Noto Serif SC",Georgia,serif; font-size:20px;
       line-height:1.5; max-width:38ch; margin:22px auto 6px; color:var(--ink)}
  .portrait b{color:var(--seal); font-weight:600}

  .axis{border-top:1px solid var(--line); padding:22px 0}
  .axis:last-of-type{border-bottom:1px solid var(--line)}
  .axis-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px}
  .axis-name{font-family:"Space Mono",monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft)}
  .axis-strength{font-family:"Space Mono",monospace; font-size:12px; color:var(--brass)}
  .poles{display:flex; justify-content:space-between; font-size:14px; margin-bottom:9px}
  .pole{color:var(--ink-soft); transition:color .3s}
  .pole .en{font-weight:600}
  .pole.on{color:var(--ink)}
  .pole.on .en{color:var(--seal)}
  .axis-track{position:relative; height:6px; background:var(--paper); border:1px solid var(--line); border-radius:4px}
  .axis-mark{position:absolute; top:50%; width:15px; height:15px; border-radius:50%; background:var(--seal);
       border:2px solid var(--card); transform:translate(-50%,-50%); left:50%; transition:left .7s cubic-bezier(.3,1,.4,1);
       box-shadow:0 2px 6px -1px rgba(178,58,46,.5)}
  .axis-desc{font-size:14px; color:var(--ink-soft); margin-top:11px; line-height:1.55}
  .axis-desc b{color:var(--ink); font-weight:600}

  .next-note{margin-top:30px; background:var(--paper-white); border:1px solid var(--line); border-radius:2px;
       padding:18px 20px; font-size:15px; color:var(--ink); display:flex; gap:12px; align-items:flex-start}
  .next-note .tag{font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.1em; color:var(--seal);
       text-transform:uppercase; white-space:nowrap; padding-top:3px}
  .res-actions{display:flex; gap:12px; margin-top:26px; flex-wrap:wrap; justify-content:center}
  .copied{font-family:"Space Mono",monospace; font-size:12px; color:var(--brass); align-self:center}

  @media (max-width:560px){
    .sheet{padding:32px 20px}
    .sheet::before{inset:6px}
    .dot[data-v="-2"]{--d:42px}.dot[data-v="2"]{--d:42px}
    .dot[data-v="-1"]{--d:35px}.dot[data-v="1"]{--d:35px}.dot[data-v="0"]{--d:28px}
    .scale-labels span{font-size:11px}
    .seal-stamp{width:78px;height:78px;right:16px;bottom:14px}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important}
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ INTRO ============ -->
  <section id="intro" class="sheet">
    <div class="sheet-inner">
      <div class="kicker">
        <span class="eyebrow">WeAcademy 2026</span>
        <span class="eyebrow">Political MBTI · 2026</span>
      </div>
      <h1>What's Your<br>Political MBTI?</h1>
      <p class="zh-sub">Made by Ho</p>
      <div class="meta-row">
        <div class="meta"><b>40</b><span>Statements</span></div>
        <div class="meta"><b>4</b><span>Dimensions</span></div>
        <div class="meta"><b>~6</b><span>Minutes</span></div>
      </div>
      <div class="axes-preview">
        <span class="chip">Identity　<b>I</b> / <b>E</b></span>
        <span class="chip">Freedom　<b>S</b> / <b>N</b></span>
        <span class="chip">Efficiency　<b>T</b> / <b>F</b></span>
        <span class="chip">Equality　<b>J</b> / <b>P</b></span>
      </div>
      <button class="btn" id="startBtn">开始测验　→</button>
    </div>
  </section>

  <!-- ============ QUIZ ============ -->
  <section id="quiz" class="sheet hidden">
    <div class="sheet-inner">
      <div class="topbar">
        <div class="count"><b id="qNow">1</b> / 40</div>
        <div class="track"><i id="bar"></i></div>
      </div>
      <div class="qcard">
        <p class="statement qanim" id="statement"><span class="qn" id="qtag">STATEMENT 01</span><span id="qtext">…</span></p>
      </div>
      <div class="likert">
        <div class="scale" id="scale">
          <button class="dot" data-v="-2" aria-label="非常不同意"><span class="k">1</span></button>
          <button class="dot" data-v="-1" aria-label="不同意"><span class="k">2</span></button>
          <button class="dot" data-v="0"  aria-label="中立"><span class="k">3</span></button>
          <button class="dot" data-v="1"  aria-label="同意"><span class="k">4</span></button>
          <button class="dot" data-v="2"  aria-label="非常同意"><span class="k">5</span></button>
        </div>
        <div class="scale-labels">
          <span>非常不同意</span><span class="mid">中立</span><span>非常同意</span>
        </div>
      </div>
      <div class="quiz-foot">
        <button class="backbtn" id="backBtn" disabled>←　上一题</button>
        <span class="kbd-hint">键盘 1–5 作答</span>
      </div>
    </div>
  </section>

  <!-- ============ RESULT ============ -->
  <section id="result" class="sheet hidden">
    <div class="sheet-inner">
      <p class="eyebrow res-eyebrow">你的政治类型 · Your Type</p>
      <div class="code-wrap">
        <span class="seal-ring"></span>
        <span class="code" id="code"></span>
        <div class="code-legend">Identity · Freedom · Efficiency · Equality</div>
      </div>
      <p class="portrait" id="portrait"></p>
      <div id="axes"></div>
      <div class="res-actions">
        <button class="btn" id="copyBtn">复制结果</button>
        <button class="btn ghost" id="retakeBtn">重新测验</button>
        <span class="copied hidden" id="copiedMsg">已复制 ✓</span>
      </div>
    </div>
  </section>

</div>

<script>
/* ---------- data: 40 items, 10 per axis, balanced direction ----------
   dim: axis id. dir:+1 => agreement supports FIRST letter, -1 => SECOND letter.
   axes first/second: identity I/E, freedom S/N, efficiency T/F, equality J/P */
const AX = {
  identity:  {first:{L:'I',en:'Independent',zh:'个人主义',d:'你把人首先看作独立的个体，个人的权利先于任何群体。'},
              second:{L:'E',en:'Embedded',zh:'社群主义',d:'你把人看作处境中的存在，家庭、文化与传统塑造着你是谁。'}, name:'Identity 身份'},
  freedom:   {first:{L:'S',en:'Shielded',zh:'消极自由',d:'自由对你是一块不被打扰的私人空间：别人不干涉，就是自由。'},
              second:{L:'N',en:'Nurtured',zh:'积极自由',d:'自由对你意味着有能力去实现自我，需要教育、医疗与机会作保障。'}, name:'Freedom 自由'},
  efficiency:{first:{L:'T',en:'Technical',zh:'技术官僚',d:'决策的正当性来自专业与理性分析，而非它有多受欢迎。'},
              second:{L:'F',en:'Folk',zh:'民主',d:'决策的正当性来自人民的同意，过程比效率更重要。'}, name:'Efficiency 效率'},
  equality:  {first:{L:'J',en:'Juridical',zh:'形式平等',d:'公平是同一套规则、对所有人一视同仁。'},
              second:{L:'P',en:'Proportional',zh:'实质平等',d:'公平是按处境区别对待，缺什么补什么。'}, name:'Equality 平等'}
};

const Q = {
  identity:[
    ['我的人生是我自己的，读什么专业、做什么工作，不该由家人的期望决定。',1],
    ['一个人最根本的身份是“独立的个体”，而不是某个家庭、民族或传统的一员。',1],
    ['国家的首要职责是保护个人权利，而不是去推广某一套“正确”的价值观。',1],
    ['就算和家里的传统观念冲突，我也该按自己相信的方式生活。',1],
    ['假期我有权一个人待着做喜欢的事，而不必去参加不想去的家庭聚会。',1],
    ['人从出生起就被家庭、文化和语言塑造，没有谁是一张白纸。',-1],
    ['一个社群有权要求它的成员去传承共同的传统和节日。',-1],
    ['为了留住一座城市的方言和老城区，值得投入公共资源，哪怕年轻人未必愿意。',-1],
    ['因为家人为我付出了很多，我对他们负有一份回报的责任。',-1],
    ['一个好的社会应当主动去培育和维护大家共享的价值观。',-1]
  ],
  freedom:[
    ['只要我不伤害别人，政府和社会就该少管我。',1],
    ['自由最重要的含义，是有一块不受他人干涉的私人空间。',1],
    ['政府不该以“为你好”为由，禁止成年人吃垃圾食品或做有风险的事。',1],
    ['学校不该以任何理由检查学生的手机和私人聊天记录。',1],
    ['强制车上所有人系安全带，是对个人选择的过度干涉。',1],
    ['一个人如果穷到上不起学，那他其实并不真正“自由”。',-1],
    ['真正的自由需要教育、医疗和机会作保障，而不只是“没人拦着你”。',-1],
    ['两个高考同分的学生，一个有昂贵补习、一个要打工，他们并没有同样的自由。',-1],
    ['国家应当主动提供支持，帮助人们获得实现自我的能力。',-1],
    ['只说“你有权利去做”是不够的，还要让人真的有能力做到。',-1]
  ],
  efficiency:[
    ['重大公共决策应该交给懂行的专家，而不是靠大众投票。',1],
    ['一个决定好不好，看的是它是否基于证据和理性，而不是有多受欢迎。',1],
    ['当专家和普通民众意见相左时，通常应该听专家的。',1],
    ['如果一个 AI 能比人更高效、更准确地做公共决策，就该让它来做。',1],
    ['遗址保护这类事，应听经过论证的专家意见，而不是村民一时的情绪。',1],
    ['一个决定是否正当，取决于它是否得到了人民的同意。',-1],
    ['即使人民可能选错，那也是他们自己的权利。',-1],
    ['就算慢一点、乱一点，重大问题也该经过公开辩论和投票。',-1],
    ['学校要不要改作息，该由全体学生投票，而不是校长和专家说了算。',-1],
    ['广泛的参与，比决策的速度和“聪明”更重要。',-1]
  ],
  equality:[
    ['真正的公平，是所有人遵守同一套规则、用同一个标准衡量。',1],
    ['大学录取应该只看分数这一条线，对所有人一视同仁。',1],
    ['给任何群体“特殊照顾”，本身就是一种不公平。',1],
    ['小组作业该全组同一个分，规则对每个人都一样。',1],
    ['制度应保持中立，不因出身背景而区别对待任何人。',1],
    ['如果大家起点本就不同，用同一把尺子衡量其实并不公平。',-1],
    ['为弥补历史和处境造成的差距，给弱势群体额外帮助是应该的。',-1],
    ['给偏远地区专项名额，是在纠正不公，而不是制造新的不公。',-1],
    ['有学习障碍的学生该获得额外考试时间，“完全一样”才是真正的不公平。',-1],
    ['评价一个人，该把他的起点和进步也算进去，而不只看最终结果。',-1]
  ]
};

// interleave axes so no two adjacent items share a dimension
const ORDER = ['identity','freedom','efficiency','equality'];
const ITEMS = [];
for(let j=0;j<10;j++){ for(const dim of ORDER){ const [text,dir]=Q[dim][j]; ITEMS.push({dim,text,dir}); } }

const TOTAL = ITEMS.length;               // 40
const answers = new Array(TOTAL).fill(null);
let cur = 0;

const $ = s => document.querySelector(s);
const statementEl=$('#qtext'), tagEl=$('#qtag'), stEl=$('#statement');
const barEl=$('#bar'), qNowEl=$('#qNow'), backBtn=$('#backBtn');

function render(){
  const it=ITEMS[cur];
  tagEl.textContent='STATEMENT '+String(cur+1).padStart(2,'0');
  statementEl.textContent=it.text;
  qNowEl.textContent=cur+1;
  barEl.style.width=((cur)/TOTAL*100)+'%';
  backBtn.disabled = cur===0;
  document.querySelectorAll('.dot').forEach(d=>{
    d.classList.toggle('pick', answers[cur]!==null && Number(d.dataset.v)===answers[cur]);
  });
}
let busy=false;                       // transition lock: one move at a time
function goTo(i){
  stEl.classList.add('fade-out');
  setTimeout(()=>{ cur=i; render(); stEl.classList.remove('fade-out'); busy=false; }, 190);
}
function choose(v){
  if(busy) return;                    // ignore extra clicks/keys during a transition
  busy=true;
  answers[cur]=v;
  document.querySelectorAll('.dot').forEach(d=>d.classList.toggle('pick',Number(d.dataset.v)===v));
  setTimeout(()=>{
    if(cur<TOTAL-1){ goTo(cur+1); }
    else if(answers.every(a=>a!==null)){ busy=false; showResult(); }
    else { goTo(answers.findIndex(a=>a===null)); }   // safety net (should not trigger now)
  },180);
}
document.querySelectorAll('.dot').forEach(d=>d.addEventListener('click',()=>choose(Number(d.dataset.v))));
backBtn.addEventListener('click',()=>{ if(!busy && cur>0){ busy=true; goTo(cur-1); } });
$('#startBtn').addEventListener('click',()=>{ busy=false; $('#intro').classList.add('hidden'); $('#quiz').classList.remove('hidden'); render(); });

document.addEventListener('keydown',e=>{
  if($('#quiz').classList.contains('hidden')) return;
  if(e.key>='1'&&e.key<='5'){ const map={'1':-2,'2':-1,'3':0,'4':1,'5':2}; choose(map[e.key]); }
  else if(e.key==='Backspace'||e.key==='ArrowLeft'){ e.preventDefault(); if(!busy && cur>0){ busy=true; goTo(cur-1); } }
});

/* ---------- scoring ---------- */
function scoreAxis(dim){
  let s=0;
  ITEMS.forEach((it,i)=>{ if(it.dim===dim) s += (answers[i]||0)*it.dir; });
  return s; // range -20..+20 (10 items * ±2)
}
function showResult(){
  const codeEl=$('#code'), axesEl=$('#axes');
  let code='', portraitPoles=[]; axesEl.innerHTML='';
  ORDER.forEach(dim=>{
    const s=scoreAxis(dim);            // >0 => first letter
    const a=AX[dim];
    const pick = s>=0 ? a.first : a.second;
    code += pick.L;
    portraitPoles.push(pick);
    const pct=Math.round(Math.abs(s)/20*100);
    const leftPct = Math.min(100,Math.max(0, 50 - (s/20)*50 )); // first letter sits left
    const firstOn = s>=0, secondOn = s<0;
    const row=document.createElement('div'); row.className='axis';
    row.innerHTML=`
      <div class="axis-head">
        <span class="axis-name">${a.name}</span>
        <span class="axis-strength">${pct>0?('偏向 '+pct+'%'):'完全中立'}</span>
      </div>
      <div class="poles">
        <span class="pole ${firstOn?'on':''}"><span class="en">${a.first.en} (${a.first.L})</span> ${a.first.zh}</span>
        <span class="pole ${secondOn?'on':''}">${a.second.zh} <span class="en">${a.second.en} (${a.second.L})</span></span>
      </div>
      <div class="axis-track"><span class="axis-mark" style="left:50%"></span></div>
      <div class="axis-desc"><b>${pick.en}　${pick.zh}：</b>${pick.d}</div>`;
    axesEl.appendChild(row);
    // animate marker after paint
    const mark=row.querySelector('.axis-mark');
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ mark.style.left=leftPct+'%'; }));
  });
  // stamped code letters
  codeEl.innerHTML = code.split('').map(c=>`<span class="stamp">${c}</span>`).join('');
  $('#portrait').innerHTML = '你是一个 '+portraitPoles.map(p=>'<b>'+p.zh+'</b>').join('、')+' 者。';
  window.__resultText = 'My Political MBTI: '+code+'  ('+portraitPoles.map(p=>p.en).join(' · ')+')';
  $('#quiz').classList.add('hidden'); $('#result').classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

$('#retakeBtn').addEventListener('click',()=>{
  for(let i=0;i<TOTAL;i++) answers[i]=null; cur=0; busy=false;
  $('#result').classList.add('hidden'); $('#intro').classList.remove('hidden');
  window.scrollTo({top:0});
});
$('#copyBtn').addEventListener('click',()=>{
  const t=window.__resultText||'';
  const done=()=>{ $('#copiedMsg').classList.remove('hidden'); setTimeout(()=>$('#copiedMsg').classList.add('hidden'),1800); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(done).catch(done); }
  else { done(); }
});
</script>
